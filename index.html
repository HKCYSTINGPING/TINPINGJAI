<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>虛擬寵物</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-view">
    <header class="nav-bar">
      <div class="nav-item nav-health">
        <span class="nav-value" aria-hidden="true">❤️❤️❤️❤️❤️</span>
      </div>
      <div class="nav-item nav-mood">
        <span class="nav-icon" aria-hidden="true">😊</span>
        <span class="nav-value">開心</span>
      </div>
      <div class="nav-item nav-days">
        <span class="nav-icon" aria-hidden="true">📅</span>
        <span class="nav-value">第 <em>0</em> 天</span>
      </div>
    </header>

    <section class="main-pet-area">
      <div class="pet-video-wrap">
        <img class="pet-img" src="tinpingjai2.png" alt="主角色">
      </div>
    </section>

    <footer class="libra-footer">
      <div class="libra-video-wrap">
        <img class="libra-img" src="Libras.png" alt="Libra 天秤">
      </div>
      <p class="libra-label">Libra · 天秤</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
